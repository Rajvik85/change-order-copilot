name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Tests and coverage
        env:
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: pytest
